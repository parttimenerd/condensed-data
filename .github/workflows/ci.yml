name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: 'sapmachine'
        cache: maven

    - name: Install femtocli
      run: |
        rm -rf ~/.m2/repository/me/bechberger/util/femtocli
        git clone --depth=1 https://github.com/parttimenerd/femtocli.git /tmp/femtocli
        cd /tmp/femtocli && mvn install -Pminimal -DskipTests -q

    - name: Run tests
      run: mvn clean test

    - name: Run spotless check
      run: mvn spotless:check

    - name: Build package
      run: mvn package -DskipTests

    - name: Generate femtojar-reencoded JARs
      run: python3 reduce-jar.py femtojar target/condensed-data.jar target/femtojar-jars/

    - name: Generate platform-specific JARs and test them
      run: |
        python3 reduce-jar.py matrix \
          target/condensed-data.jar \
          target/platform-jars/ \
          --with-minimal \
          --minimal-output-dir target/platform-jars-minimal/ \
          --run-tests

    - name: Upload main JAR
      uses: actions/upload-artifact@v6
      with:
        name: condensed-data.jar
        path: target/condensed-data.jar
        retention-days: 30

    - name: Upload femtojar JARs
      uses: actions/upload-artifact@v6
      with:
        name: femtojar-jars
        path: target/femtojar-jars/
        retention-days: 30

    - name: Upload platform JARs
      uses: actions/upload-artifact@v6
      with:
        name: platform-jars
        path: target/platform-jars/
        retention-days: 30

    - name: Upload minimal platform JARs
      uses: actions/upload-artifact@v6
      with:
        name: platform-jars-minimal
        path: target/platform-jars-minimal/
        retention-days: 30

  # Rolling prerelease: keeps a single `latest` GitHub release always built from the
  # newest commit on main. action-gh-release moves the `latest` tag to the current commit
  # and replaces the release assets, so no stale prereleases accumulate.
  snapshot-release:
    needs: test
    runs-on: ubuntu-latest
    if: github.repository == 'parttimenerd/condensed-data' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: 'sapmachine'
        cache: maven

    - name: Install femtocli
      run: |
        rm -rf ~/.m2/repository/me/bechberger/util/femtocli
        git clone --depth=1 https://github.com/parttimenerd/femtocli.git /tmp/femtocli
        cd /tmp/femtocli && mvn install -Pminimal -DskipTests -q

    - name: Build package
      run: mvn clean package -DskipTests

    - name: Generate platform-specific JARs
      run: |
        python3 reduce-jar.py matrix \
          target/condensed-data.jar \
          target/platform-jars/ \
          --with-minimal \
          --minimal-output-dir target/platform-jars-minimal/

    # action-gh-release updates an existing release's assets but does NOT re-point an
    # already-existing tag at target_commitish, so the `latest` tag would drift behind
    # the newest main commit. Force-move the tag ourselves first so tag == release commit.
    - name: Move latest tag to current commit
      run: |
        git tag -f latest ${{ github.sha }}
        git push -f origin latest

    - name: Publish rolling latest release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        target_commitish: ${{ github.sha }}
        name: Latest build
        prerelease: true
        make_latest: false
        body: |
          Rolling development build from `main`, commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

          ⚠️ Prerelease — may be unstable.

          ```bash
          java -jar condensed-data.jar --help
          ```

          Platform-specific JARs are smaller variants that bundle native libraries for a single OS/architecture.
        files: |
          target/condensed-data.jar
          target/platform-jars/*.jar
          target/platform-jars-minimal/*.jar
        token: ${{ secrets.GITHUB_TOKEN }}