name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: 'sapmachine'
        cache: maven

    - name: Run tests
      run: mvn clean test

    - name: Run spotless check
      run: mvn spotless:check

    - name: Build package
      run: mvn package -DskipTests

    - name: Generate platform-specific JARs
      run: python3 reduce-jar.py matrix target/condensed-data.jar target/platform-jars/

    - name: Upload JARs as individual artifacts
      uses: actions/github-script@v7
      with:
        script: |
          const {DefaultArtifactClient} = require('@actions/artifact')
          const fs = require('fs')
          const path = require('path')
          const client = new DefaultArtifactClient()
          const options = { retentionDays: 30 }

          await client.uploadArtifact('condensed-data.jar', ['target/condensed-data.jar'], '.', options)

          const platformJars = fs.readdirSync('target/platform-jars').filter(f => f.endsWith('.jar'))
          for (const jar of platformJars) {
            await client.uploadArtifact(jar, [`target/platform-jars/${jar}`], '.', options)
          }

  snapshot-release:
    needs: test
    runs-on: ubuntu-latest
    if: false # disabled for now
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'sapmachine'
        cache: maven

    - name: Configure Git user
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"

    - name: Generate snapshot version
      id: version
      run: |
        # Get current version from pom.xml
        CURRENT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "Current version: $CURRENT_VERSION"
        
        # Generate timestamp-based snapshot version
        TIMESTAMP=$(date -u +"%Y%m%d.%H%M%S")
        COMMIT_SHA=$(git rev-parse --short HEAD)
        
        if [[ $CURRENT_VERSION == *-SNAPSHOT ]]; then
          BASE_VERSION=${CURRENT_VERSION%-SNAPSHOT}
          SNAPSHOT_VERSION="${BASE_VERSION}-${TIMESTAMP}.${COMMIT_SHA}-SNAPSHOT"
        else
          SNAPSHOT_VERSION="${CURRENT_VERSION}-${TIMESTAMP}.${COMMIT_SHA}-SNAPSHOT"
        fi
        
        echo "snapshot_version=$SNAPSHOT_VERSION" >> $GITHUB_OUTPUT
        echo "Generated snapshot version: $SNAPSHOT_VERSION"

    - name: Set snapshot version
      run: |
        mvn versions:set -DnewVersion=${{ steps.version.outputs.snapshot_version }}
        mvn versions:commit

    - name: Build package with snapshot version
      run: mvn clean package -DskipTests

    - name: Generate platform-specific JARs
      run: python3 reduce-jar.py matrix target/condensed-data.jar target/platform-jars/

    - name: Create GitHub release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.snapshot_version }}
        name: Snapshot Release v${{ steps.version.outputs.snapshot_version }}
        body: |
          🚀 **Automated Snapshot Release**
          
          This is a development snapshot build from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).
          
          **⚠️ Warning**: This is a pre-release snapshot and may be unstable.
          
          **Changes in this commit:**
          ${{ github.event.head_commit.message }}
          
          **CLI Usage:**
          Download the JAR file below and run:
          ```bash
          java -jar condensed-data.jar --help
          ```
          
          **Platform-specific JARs** are smaller variants that only include native libraries for a single OS/architecture.
        draft: false
        prerelease: true
        files: |
          target/condensed-data.jar
          target/platform-jars/*.jar
        token: ${{ secrets.GITHUB_TOKEN }}