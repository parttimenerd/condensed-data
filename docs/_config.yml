title: cjfr — Condensed JFR
description: >-
  A library and CLI for reading and writing condensed JFR event data.
  Simple, self-describing, space-saving format for long-term JFR storage.
url: "https://parttimenerd.github.io"
baseurl: "/condensed-data"
repository: parttimenerd/condensed-data

remote_theme: just-the-docs/just-the-docs

# just-the-docs configuration
color_scheme: light
search_enabled: true
heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/parttimenerd/condensed-data"
  "Releases":
    - "https://github.com/parttimenerd/condensed-data/releases/latest"

aux_links_new_tab: true

nav_external_links:
  - title: File Format Spec (dev)
    url: https://github.com/parttimenerd/condensed-data/blob/main/doc/FORMAT.md

footer_content: >-
  MIT licensed. Copyright 2024 SAP SE or an SAP affiliate company,
  Johannes Bechberger and contributors.

plugins:
  - jekyll-seo-tag

# Exclude repo internals that Jekyll would otherwise try to render.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - superpowers/
